<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareGuide Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #fff;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
    }

    header p {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 2px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
    }

    .section label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 13px;
      color: #374151;
    }

    .section input[type="tel"],
    .section select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-row span {
      font-size: 13px;
      color: #374151;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2563eb;
    }

    .save-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 14px 16px;
      padding: 11px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .save-btn:hover { background: #1d4ed8; }

    #saved-msg {
      text-align: center;
      font-size: 12px;
      color: #16a34a;
      padding-bottom: 12px;
      display: none;
    }

    footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <span style="font-size:24px">🩺</span>
    <div>
      <h1>CareGuide</h1>
      <p>Your patient portal navigator</p>
    </div>
  </header>

  <div class="section">
    <label for="caregiver-phone">Caregiver Phone Number</label>
    <input type="tel" id="caregiver-phone" placeholder="+1 (555) 000-0000" />
  </div>

  <div class="section">
    <label for="language-pref">Preferred Language</label>
    <select id="language-pref">
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="zh">中文 (Chinese)</option>
      <option value="hi">हिन्दी (Hindi)</option>
      <option value="ur">اردو (Urdu)</option>
    </select>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span>Read responses aloud</span>
      <input type="checkbox" id="voice-enabled" checked />
    </div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span>Auto-open sidebar on portal pages</span>
      <input type="checkbox" id="auto-open" checked />
    </div>
  </div>

  <button class="save-btn" id="save-btn">Save Settings</button>
  <div id="saved-msg">✅ Settings saved!</div>

  <footer>CareGuide v1.0 — Built at UC Berkeley Hackathon</footer>

  <script src="popup.js"></script>
</body>
</html>
