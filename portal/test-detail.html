<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MyHealth Online — Test Result</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body data-page="results">
  <div class="app">
    <main class="main">
      <div class="content">
        <div class="breadcrumb"><a href="demo-portal.html">Home</a> &rsaquo; <a href="test-results.html">Test Results</a> &rsaquo; <span id="bc-name">Result</span></div>
        <h1 id="t-name">Result</h1>
        <p class="muted" id="t-sub"></p>

        <div id="t-message"></div>

        <h3 style="margin-top:18px">Results</h3>
        <table class="results">
          <thead><tr><th>Component</th><th>Value</th><th>Units</th><th>Normal Range</th><th>Status</th></tr></thead>
          <tbody id="t-rows"></tbody>
        </table>

        <div class="btn-row">
          <button class="btn" data-act="A trend graph of your past results was opened.">Compare result trends</button>
          <a id="t-learn" class="btn" target="_blank" rel="noopener">Learn more about this test</a>
        </div>

        <div class="card col-12" style="margin-top:18px">
          <h3>Additional Information</h3>
          <div class="grid" id="t-addl"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="portal.js"></script>
  <script>
    // status -> badge class
    function sev(s){ return s === 'Normal' ? 'ok' : (s === 'Critical' ? 'danger' : 'warn'); }

    var TESTS = {
      lipid: {
        name: "Lipid Profile", collected: "Jun 15, 2026 9:30 AM", resultDate: "Jun 15, 2026 10:54 AM",
        provider: "Sarah Chen, MD", specimen: "Serum (Blood)", lab: "Regional Medical Laboratory",
        learn: "https://medlineplus.gov/lab-tests/cholesterol-levels/",
        message: { from: "Sarah Chen, MD", date: "Jun 15, 2026 3:09 PM",
          text: "Your cholesterol is close to goal but your “good” cholesterol (HDL) is a little low and triglycerides are mildly high. Please continue your atorvastatin and we'll recheck in 3 months." },
        rows: [
          ["Total Cholesterol","195","mg/dL","< 200","Normal"],
          ["Triglyceride","180","mg/dL","< 150","High"],
          ["HDL Cholesterol","38","mg/dL","> 40","Low"],
          ["LDL Cholesterol (Calculated)","122","mg/dL","< 130","Normal"],
          ["Cholesterol / HDL Ratio","5.1","—","< 5.0","High"],
          ["VLDL Cholesterol (Calculated)","28","mg/dL","5 – 40","Normal"]
        ]
      },
      a1c: {
        name: "Hemoglobin A1c", collected: "Jun 15, 2026 9:30 AM", resultDate: "Jun 15, 2026 10:40 AM",
        provider: "Sarah Chen, MD", specimen: "Whole Blood", lab: "Regional Medical Laboratory",
        learn: "https://medlineplus.gov/lab-tests/hemoglobin-a1c/",
        message: { from: "Sarah Chen, MD", date: "Jun 15, 2026 3:10 PM",
          text: "Your A1c is 7.2%, a little above our goal of under 7%. Let's review your blood sugar logs and discuss a small medication adjustment at your next visit." },
        rows: [
          ["Hemoglobin A1c","7.2","%","< 5.7 (normal); 5.7–6.4 (prediabetes)","High"],
          ["Estimated Average Glucose","160","mg/dL","< 126","High"]
        ]
      },
      cmp: {
        name: "Comprehensive Metabolic Panel", collected: "Jun 15, 2026 9:30 AM", resultDate: "Jun 15, 2026 11:05 AM",
        provider: "Sarah Chen, MD", specimen: "Serum (Blood)", lab: "Regional Medical Laboratory",
        learn: "https://medlineplus.gov/lab-tests/comprehensive-metabolic-panel-cmp/",
        message: { from: "Sarah Chen, MD", date: "Jun 15, 2026 3:12 PM",
          text: "Most of your panel looks good. Your potassium is slightly low at 3.3 — please eat potassium-rich foods (banana, potato, beans) and we'll recheck it. Your fasting sugar is a bit high, consistent with your diabetes." },
        rows: [
          ["Glucose","142","mg/dL","70 – 99","High"],
          ["Potassium","3.3","mmol/L","3.5 – 5.1","Low"],
          ["Sodium","139","mmol/L","135 – 145","Normal"],
          ["Chloride","102","mmol/L","98 – 107","Normal"],
          ["CO2 (Bicarbonate)","26","mmol/L","22 – 29","Normal"],
          ["BUN","18","mg/dL","7 – 20","Normal"],
          ["Creatinine","1.0","mg/dL","0.7 – 1.3","Normal"],
          ["Calcium","9.4","mg/dL","8.5 – 10.2","Normal"],
          ["Albumin","4.2","g/dL","3.5 – 5.0","Normal"],
          ["AST","24","U/L","10 – 40","Normal"],
          ["ALT","28","U/L","7 – 56","Normal"]
        ]
      },
      cbc: {
        name: "Complete Blood Count (CBC)", collected: "Jun 15, 2026 9:30 AM", resultDate: "Jun 15, 2026 10:48 AM",
        provider: "Sarah Chen, MD", specimen: "Whole Blood", lab: "Regional Medical Laboratory",
        learn: "https://medlineplus.gov/lab-tests/complete-blood-count-cbc/",
        message: null,
        rows: [
          ["White Blood Cells (WBC)","6.8","10⁹/L","4.0 – 11.0","Normal"],
          ["Red Blood Cells (RBC)","4.7","10¹²/L","4.5 – 5.9","Normal"],
          ["Hemoglobin","14.2","g/dL","13.5 – 17.5","Normal"],
          ["Hematocrit","42","%","41 – 53","Normal"],
          ["Platelets","240","10⁹/L","150 – 400","Normal"],
          ["MCV","88","fL","80 – 100","Normal"]
        ]
      },
      "lipid-2025": {
        name: "Lipid Profile", collected: "Dec 10, 2025 8:45 AM", resultDate: "Dec 10, 2025 10:20 AM",
        provider: "Sarah Chen, MD", specimen: "Serum (Blood)", lab: "Regional Medical Laboratory",
        learn: "https://medlineplus.gov/lab-tests/cholesterol-levels/",
        message: null,
        rows: [
          ["Total Cholesterol","205","mg/dL","< 200","Borderline"],
          ["Triglyceride","165","mg/dL","< 150","High"],
          ["HDL Cholesterol","36","mg/dL","> 40","Low"],
          ["LDL Cholesterol (Calculated)","130","mg/dL","< 130","Borderline"],
          ["Cholesterol / HDL Ratio","5.7","—","< 5.0","High"],
          ["VLDL Cholesterol (Calculated)","33","mg/dL","5 – 40","Normal"]
        ]
      },
      tsh: {
        name: "Thyroid Screen (TSH)", collected: "Dec 10, 2025 8:45 AM", resultDate: "Dec 10, 2025 10:25 AM",
        provider: "Sarah Chen, MD", specimen: "Serum (Blood)", lab: "Regional Medical Laboratory",
        learn: "https://medlineplus.gov/lab-tests/tsh-thyroid-stimulating-hormone-test/",
        message: null,
        rows: [
          ["TSH","2.4","mIU/L","0.4 – 4.0","Normal"]
        ]
      }
    };

    var key = (new URLSearchParams(location.search).get('t')) || 'lipid';
    var d = TESTS[key] || TESTS.lipid;

    document.getElementById('bc-name').textContent = d.name;
    document.getElementById('t-name').textContent = d.name;
    document.getElementById('t-sub').textContent =
      "Collected on " + d.collected + ". If you have questions about your results, contact the clinician who ordered the test.";
    document.title = "MyHealth Online — " + d.name;
    document.getElementById('t-learn').href = d.learn;

    if (d.message) {
      document.getElementById('t-message').innerHTML =
        '<div class="message"><strong>Message from ' + d.message.from + '</strong>' +
        '<div class="muted" style="font-size:13px">' + d.message.date + '</div>' +
        '<p style="margin:6px 0">' + d.message.text + '</p>' +
        '<a href="messages.html">View conversation in Messages</a></div>';
    }

    document.getElementById('t-rows').innerHTML = d.rows.map(function (r) {
      return '<tr><td>' + r[0] + '</td><td><strong>' + r[1] + '</strong></td><td>' + r[2] +
             '</td><td>' + r[3] + '</td><td><span class="badge ' + sev(r[4]) + '">' + r[4] + '</span></td></tr>';
    }).join('');

    document.getElementById('t-addl').innerHTML =
      '<div class="col-6"><span class="muted">Authorizing provider:</span> <b>' + d.provider + '</b></div>' +
      '<div class="col-6"><span class="muted">Collection date:</span> <b>' + d.collected + '</b></div>' +
      '<div class="col-6"><span class="muted">Specimen:</span> <b>' + d.specimen + '</b></div>' +
      '<div class="col-6"><span class="muted">Result date:</span> <b>' + d.resultDate + '</b></div>' +
      '<div class="col-6"><span class="muted">Result status:</span> <b>Final</b></div>' +
      '<div class="col-6"><span class="muted">Resulting lab:</span> <b>' + d.lab + '</b></div>';
  </script>
</body>
</html>
